<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GECTO Projects – Graphic Design Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header><div class="logo"><img src="gecto-logo.png" alt="Logo"></div><button class="menu-btn">☰ MENU</button></header>
<div class="menu-overlay"><button class="close-menu">✕</button><ul><li><a href="index.html">HOME</a></li><li><a href="projects.html">PROJECTS</a></li></ul></div>

<section>
    <h1 class="section-title">Our Creative Projects</h1>
    <p style="text-align:center">20+ graphic design works for artists, churches, models & more.</p>
    <div class="project-grid" id="projectGrid">
        <!-- Generate 20 cards dynamically with JS to save space, but I'll write 6 samples, you can duplicate -->
    </div>
</section>
<script>
    const projects = [
        { name: "Dunamis Bible Church – Poster", img: "https://placehold.co/400x300?text=Dunamis+Poster" },
        { name: "Artist Album Cover", img: "https://placehold.co/400x300?text=Album+Art" },
        { name: "Model Portfolio Branding", img: "https://placehold.co/400x300?text=Model+Identity" },
        { name: "Flyer – Music Event", img: "https://placehold.co/400x300?text=Event+Flyer" },
        { name: "Logo for Startup", img: "https://placehold.co/400x300?text=Logo" },
        { name: "Social Media Kit", img: "https://placehold.co/400x300?text=Social+Media" }
    ];
    // Repeat to show 20+ (just duplicate)
    for(let i=0; i<20; i++) {
        let p = projects[i % projects.length];
        let card = `<div class="project-card"><img src="${p.img}" alt="${p.name}"><h3>${p.name} ${Math.floor(i/6)+1}</h3></div>`;
        document.getElementById('projectGrid').innerHTML += card;
    }
</script>
<footer><p>Over 20 projects delivered – your brand next.</p></footer>
<script src="script.js"></script>
</body>
